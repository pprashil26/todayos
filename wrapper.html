<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Today OS</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  html, body { height:100%; width:100%; background:#fff; }
  body { display:flex; flex-direction:column; }

  header {
    height:50px; display:flex; align-items:center; justify-content:center;
    border-bottom:1px solid #eee; font-size:16px; letter-spacing:0.5px;
    background:#fff; position:sticky; top:0; z-index:10;
  }

  header button {
    background:none; border:none; padding:0 20px; cursor:pointer;
    font-size:16px; color:#999; height:100%; display:flex; align-items:center;
  }

  header button.active {
    color:#000; font-weight:600; border-bottom:2px solid #000;
  }

  main { flex:1; display:flex; flex-direction:column; }
  iframe { flex:1; width:100%; border:none; display:none; }
  iframe.active { display:block; }

  iframe::-webkit-scrollbar { display:none; }
  iframe { -ms-overflow-style:none; scrollbar-width:none; }
</style>
</head>

<body>

<header>
  <span style="font-weight:600; margin-right:40px;">Today OS</span>
  <button id="btnToday" onclick="switchApp('today')">Today</button>
  <button id="btnTime" onclick="switchApp('time')">Time Tool</button>
  <button id="btnJournal" onclick="switchApp('journal')">Private Journal</button>
</header>

<main>
  <iframe id="todayFrame" src="https://pprashil26.github.io/today/"></iframe>
  <iframe id="timeFrame" src="https://pprashil26.github.io/time/"></iframe>
  <iframe id="journalFrame" src="private-journal.html"></iframe>
</main>

<script>
const todayFrame = document.getElementById('todayFrame');
const timeFrame = document.getElementById('timeFrame');
const btnToday = document.getElementById('btnToday');
const btnTime = document.getElementById('btnTime');
const journalFrame = document.getElementById('journalFrame');
const btnJournal = document.getElementById('btnJournal');

function switchApp(app){
  // Hide all iframes
  todayFrame.classList.remove('active');
  timeFrame.classList.remove('active');
  journalFrame.classList.remove('active');

  // Remove active class from all buttons
  btnToday.classList.remove('active');
  btnTime.classList.remove('active');
  btnJournal.classList.remove('active');

  // Show selected app
  if(app==='today'){
    todayFrame.classList.add('active');
    btnToday.classList.add('active');
  } else if(app==='time'){
    timeFrame.classList.add('active');
    btnTime.classList.add('active');
  } else if(app==='journal'){
    journalFrame.classList.add('active');
    btnJournal.classList.add('active');
  }

  localStorage.setItem('activeApp', app);
}

// Load app from hash or last used
const hash = window.location.hash.replace('#','');
if(hash==='today'||hash==='time'||hash==='journal'){ switchApp(hash); }
else { const saved = localStorage.getItem('activeApp') || 'today'; switchApp(saved); }

// Keyboard shortcuts
document.addEventListener('keydown', e=>{
  if(e.key==='1') switchApp('today');
  if(e.key==='2') switchApp('time');
});

// Mobile swipe support
let touchStartX=null;
document.addEventListener('touchstart', e=>{ touchStartX=e.changedTouches[0].screenX; }, false);
document.addEventListener('touchend', e=>{
  if(!touchStartX) return;
  const touchEndX=e.changedTouches[0].screenX;
  const diff=touchStartX-touchEndX;
  if(diff>50){ if(todayFrame.classList.contains('active')) switchApp('time'); else switchApp('today'); }
  else if(diff<-50){ if(timeFrame.classList.contains('active')) switchApp('today'); else switchApp('time'); }
  touchStartX=null;
}, false);
</script>

</body>
</html>
