<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today OS</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #fff;
    color: #000;
    text-align: center;
  }

  h1 {
    font-size: 2em;
    margin-bottom: 0.5em;
  }

  p {
    font-size: 1em;
    margin-bottom: 2em;
    color: #555;
  }

  .buttons {
    display: flex;
    gap: 1em;
  }

  .buttons a {
    text-decoration: none;
    padding: 12px 24px;
    border: 1px solid #000;
    color: #000;
    font-weight: 600;
    border-radius: 6px;
    transition: background 0.2s, color 0.2s;
  }

  .buttons a:hover {
    background: #000;
    color: #fff;
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.5em; }
    .buttons { flex-direction: column; gap: 0.5em; }
    .buttons a { padding: 10px 16px; }
  }
</style>
</head>

<body>

<h1>Today OS</h1>
<p>A minimal operating system for your day.</p>

<div class="buttons">
  <a href="wrapper.html#today">Open Today</a>
  <a href="wrapper.html#time">Open Time Tool</a>
</div>

</body>
</html>
